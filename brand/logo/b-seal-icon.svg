<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="太旺旺">
  <!--
    Direction B: 印記 (Seal Mark)
    Hanko/篆刻-inspired. Cultural bridge — seals shared by China and Japan.
    Works as favicon, social avatar, stamp.
    Final version: convert text to outlines.
  -->

  <!-- Outer border -->
  <rect x="3" y="3" width="58" height="58" rx="2"
        fill="none" stroke="#1a1812" stroke-width="2.5"/>

  <!-- Inner border -->
  <rect x="8" y="8" width="48" height="48" rx="1"
        fill="none" stroke="#1a1812" stroke-width="0.75"/>

  <!-- Character -->
  <text x="32" y="44"
        text-anchor="middle"
        font-family="'Noto Serif JP', 'Noto Serif TC', serif"
        font-size="30"
        font-weight="600"
        fill="#1a1812">旺</text>
</svg>
