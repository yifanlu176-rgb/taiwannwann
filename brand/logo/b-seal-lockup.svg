<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-label="太旺旺">
  <!--
    Direction B: Seal + Wordmark horizontal lockup
    Seal on left, wordmark on right.
  -->

  <!-- Seal mark (scaled) -->
  <g transform="translate(0,0)">
    <rect x="3" y="3" width="58" height="58" rx="2"
          fill="none" stroke="#1a1812" stroke-width="2.5"/>
    <rect x="8" y="8" width="48" height="48" rx="1"
          fill="none" stroke="#1a1812" stroke-width="0.75"/>
    <text x="32" y="44"
          text-anchor="middle"
          font-family="'Noto Serif JP', 'Noto Serif TC', serif"
          font-size="30"
          font-weight="600"
          fill="#1a1812">旺</text>
  </g>

  <!-- Wordmark -->
  <text x="92" y="40"
        font-family="'Noto Serif JP', 'Noto Serif TC', serif"
        font-size="28"
        font-weight="400"
        fill="#1a1812"
        letter-spacing="0.3em">太旺旺</text>
</svg>
