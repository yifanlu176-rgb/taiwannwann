<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 64" role="img" aria-label="太旺旺">
  <!--
    Direction C: Geometric mark + wordmark horizontal lockup
  -->

  <!-- Geometric mark (scaled into 52x52 area, centered vertically) -->
  <g transform="translate(4, 10) scale(0.85)">
    <!-- 日 — Sun square -->
    <rect x="8" y="14" width="20" height="20" rx="1"
          fill="#1a1812"/>
    <line x1="8" y1="24" x2="28" y2="24"
          stroke="#f7f2ea" stroke-width="1.5"/>

    <!-- 王 — Three bars -->
    <rect x="34" y="14" width="22" height="3" rx="0.5"
          fill="#b8915c"/>
    <rect x="34" y="23" width="22" height="3" rx="0.5"
          fill="#b8915c"/>
    <rect x="34" y="31" width="22" height="3" rx="0.5"
          fill="#b8915c"/>

    <!-- Vertical spine -->
    <rect x="43" y="14" width="2.5" height="20" rx="0.5"
          fill="#b8915c" opacity="0.3"/>
  </g>

  <!-- Wordmark -->
  <text x="82" y="40"
        font-family="'Noto Serif JP', 'Noto Serif TC', serif"
        font-size="28"
        font-weight="400"
        fill="#1a1812"
        letter-spacing="0.3em">太旺旺</text>
</svg>
