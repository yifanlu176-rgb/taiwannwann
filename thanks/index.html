<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ完了 | 太旺旺株式会社</title>
<meta name="description" content="太旺旺株式会社へのお問い合わせを受け付けました。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #f7f2ea;
  --paper: #faf7f2;
  --warm: #c8956c;
  --warm2: #a5714a;
  --charcoal: #2c2520;
  --mid: #6b5c4e;
  --border: rgba(122,79,45,0.12);
  --serif-jp: 'Noto Serif JP', serif;
  --sans-jp: 'Noto Sans JP', sans-serif;
  --serif-en: 'Cormorant Garamond', serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  background:
    radial-gradient(circle at top, rgba(200,149,108,0.12), transparent 30%),
    linear-gradient(180deg, var(--paper), var(--cream));
  color: var(--charcoal);
  font-family: var(--serif-jp);
}
.thanks-shell {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 2rem;
}
.thanks-card {
  width: min(720px, 100%);
  background: rgba(250,247,242,0.88);
  border: 1px solid var(--border);
  box-shadow: 0 24px 80px rgba(44,37,32,0.08);
  padding: clamp(2rem, 5vw, 4rem);
  backdrop-filter: blur(14px);
}
.eyebrow {
  font-family: var(--serif-en);
  font-size: .8rem;
  letter-spacing: .35em;
  color: var(--warm);
  font-style: italic;
  margin: 0 0 1.2rem;
}
h1 {
  margin: 0;
  font-size: clamp(2rem, 5vw, 3.4rem);
  line-height: 1.35;
  letter-spacing: .08em;
}
.lead {
  margin: 1.2rem 0 0;
  color: var(--mid);
  line-height: 2;
  font-size: 1rem;
}
.actions {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  margin-top: 2rem;
}
.btn {
  display: inline-block;
  text-decoration: none;
  padding: .95rem 1.6rem;
  border: 1px solid var(--border);
  color: var(--charcoal);
  font-family: var(--sans-jp);
  letter-spacing: .12em;
}
.btn.primary {
  background: var(--warm);
  border-color: var(--warm);
  color: white;
}
.note {
  margin-top: 1.4rem;
  font-family: var(--sans-jp);
  font-size: .84rem;
  color: var(--mid);
  line-height: 1.9;
}
[data-lang="zh"] { display: none; }
body.zh [data-lang="ja"] { display: none; }
body.zh [data-lang="zh"] { display: unset; }
@media (max-width: 600px) {
  .actions { flex-direction: column; }
  .btn { text-align: center; }
}
</style>
</head>
<body>
<main class="thanks-shell">
  <section class="thanks-card">
    <p class="eyebrow">Contact Received</p>
    <h1 data-lang="ja">お問い合わせを受け付けました。</h1>
    <h1 data-lang="zh">我們已收到您的聯繫。</h1>
    <p class="lead" data-lang="ja">24時間以内にご返信いたします。内容の確認を進めていますので、今しばらくお待ちください。</p>
    <p class="lead" data-lang="zh">我們將在24小時內回覆您，正在確認您的訊息，請稍候。</p>
    <div class="actions">
      <a class="btn primary" href="../" data-lang="ja">トップページへ戻る</a>
      <a class="btn primary" href="../" data-lang="zh">返回首頁</a>
    </div>
    <p class="note" data-lang="ja">※ 受信内容に応じて、メールまたはSNS経由でご連絡する場合があります。</p>
    <p class="note" data-lang="zh">※ 我們可能會依內容透過電子郵件或社群帳號回覆您。</p>
  </section>
</main>
<script>
const lang = new URLSearchParams(location.search).get('lang');
if (lang === 'zh') document.body.classList.add('zh');
</script>
</body>
</html>
